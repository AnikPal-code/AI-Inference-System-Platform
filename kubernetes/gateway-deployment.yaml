apiVersion: apps/v1
kind: Deployment

metadata:
  name: gateway-deployment

spec:
  replicas: 3

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: gateway

  template:
    metadata:
      annotations:
        version: "2"
      labels:
        app: gateway

    spec:
      containers:
        - name: gateway
          image: aiinferenceplatform-gateway:latest
          imagePullPolicy: Never

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"

          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: gateway-config